name: Salesforce Enterprise CI-CD Automation Pipeline

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]

jobs:
  static-code-analysis:
    name: 'Stage 1: Code Quality & Static Guardrails Review'
    runs-on: ubuntu-latest
    steps:
      - name: 'Source Code Checkout Extraction'
        uses: actions/checkout@v4

      - name: 'Verify Local Salesforce Project Structure'
        run: |
          # Verifies sfdx-project.json exists and verifies source track properties cleanly
          ls -la force-app/main/default/
          cat sfdx-project.json
