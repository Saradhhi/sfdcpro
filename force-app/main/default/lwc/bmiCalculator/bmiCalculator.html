<template>
    <lightning-card title="BMI Calculator" icon-name="custom:custom13">
        <div class="slds-var-m-around_medium">
            <lightning-input 
                type="number" 
                label="Weight (kg)" 
                value={weight} 
                onchange={handleWeightChange} 
                step="0.1"
                placeholder="e.g. 70">
            </lightning-input>

            <lightning-input 
                type="number" 
                label="Height (m)" 
                value={height} 
                onchange={handleHeightChange} 
                step="0.01"
                placeholder="e.g. 1.75">
            </lightning-input>

            <div class="slds-var-m-top_medium">
                <lightning-button 
                    label="Calculate BMI" 
                    variant="brand" 
                    onclick={calculateBMI}
                    is-disabled={isInvalidInput}>
                </lightning-button>
            </div>

            <template if:true={bmiResult}>
                <div class="slds-var-m-top_large slds-p-around_medium slds-box slds-theme_shade">
                    <p class="slds-text-heading_medium">Your BMI: <strong>{bmiResult}</strong></p>
                    <p class={resultClass}>Status: {bmiStatus}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
