<template>
    <lightning-card title="Currency Converter" icon-name="custom:custom17">
        <div class="slds-var-m-around_medium">
            <lightning-input 
                type="number" 
                label="Enter Amount" 
                value={amount} 
                onchange={handleAmountChange} 
                placeholder="e.g. 100">
            </lightning-input>

            <div class="slds-grid slds-gutters slds-var-m-top_small">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox name="fromCurrency" label="From" value={fromCurrency} options={currencyOptions} onchange={handleCurrencyChange}></lightning-combobox>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-combobox name="toCurrency" label="To" value={toCurrency} options={currencyOptions} onchange={handleCurrencyChange}></lightning-combobox>
                </div>
            </div>

            <div class="slds-var-m-top_medium">
                <lightning-button variant="brand" label="Convert" onclick={convertCurrency} is-disabled={isInvalidAmount}></lightning-button>
            </div>

            <template if:true={conversionResult}>
                <div class="slds-var-m-top_large slds-p-around_medium slds-box slds-theme_shade">
                    <p class="slds-text-heading_medium">
                        <strong>{amount} {fromCurrency}</strong> = 
                        <span class="slds-text-color_success"><strong>{conversionResult} {toCurrency}</strong></span>
                    </p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
