<template>
    <lightning-card title="Employee Feedback Survey" icon-name="custom:custom41">
        <div class="slds-var-m-around_medium">
            <template if:false={isSubmitted}>
                <div class="slds-form slds-form_stacked">
                    <lightning-input 
                        type="text" 
                        label="Full Name" 
                        name="employeeName"
                        value={employeeName} 
                        onchange={handleInputChange} 
                        required
                        placeholder="e.g. John Doe">
                    </lightning-input>

                    <lightning-radio-group 
                        name="department"
                        label="Department"
                        options={deptOptions}
                        value={department}
                        type="radio"
                        onchange={handleInputChange}
                        required>
                    </lightning-radio-group>

                    <lightning-slider 
                        label="Work Environment Satisfaction (1-10)" 
                        name="satisfactionScore"
                        value={satisfactionScore}
                        min="1"
                        max="10"
                        onchange={handleInputChange}>
                    </lightning-slider>

                    <lightning-textarea 
                        label="Additional Comments or Suggestions" 
                        name="feedbackComments"
                        value={feedbackComments}
                        onchange={handleInputChange}
                        max-length="500"
                        placeholder="Share your thoughts with us...">
                    </lightning-textarea>

                    <div class="slds-var-m-top_medium">
                        <lightning-button 
                            variant="brand" 
                            label="Submit Survey" 
                            onclick={handleSubmit}>
                        </lightning-button>
                    </div>
                </div>
            </template>

            <template if:true={isSubmitted}>
                <div class="slds-box slds-theme_success slds-text-align_center slds-p-around_large">
                    <lightning-icon icon-name="action:approval" size="large" alternative-text="Success"></lightning-icon>
                    <h2 class="slds-text-heading_large slds-var-m-top_medium slds-text-color_inverse">Thank you, {employeeName}!</h2>
                    <p class="slds-text-body_regular slds-var-m-top_small slds-text-color_inverse">Your satisfaction score of {satisfactionScore}/10 has been successfully logged.</p>
                    <div class="slds-var-m-top_medium">
                        <lightning-button variant="neutral" label="Submit Another Response" onclick={resetForm}></lightning-button>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
