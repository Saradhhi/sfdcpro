<template>
    <section role="dialog" tabindex="-1" class={modalClass} aria-modal="true">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                    class="slds-modal__close" alternative-text="Close" onclick={handleClose}></lightning-button-icon>
                <h2 class="slds-modal__title">{header}</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium"><slot></slot></div>
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={handleClose}></lightning-button>
                <lightning-button label="Save" variant="brand" onclick={handleSave}></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
