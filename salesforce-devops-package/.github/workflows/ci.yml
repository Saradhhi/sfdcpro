name: Salesforce CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > auth-url.txt
          sf org login sfdx-url --sfdx-url-file auth-url.txt --alias target-org

      - name: Run Apex Tests
        run: sf apex run test --target-org target-org --result-format human --wait 10

      - name: Deploy to Org
        if: github.ref == 'refs/heads/main'
        run: sf project deploy start --target-org target-org --ignore-conflicts

      - name: Clean Up
        if: always()
        run: rm -f auth-url.txt
