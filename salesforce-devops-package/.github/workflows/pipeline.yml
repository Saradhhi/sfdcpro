name: Full CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate (QA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @salesforce/cli
      - run: sf org login jwt --client-id ${{ secrets.SF_CLIENT_ID }} --jwt-key-file server.key --username ${{ secrets.SF_QA_USERNAME }}
      - run: bash scripts/validate.sh
        env: { TARGET_ORG: ${{ secrets.SF_QA_USERNAME }} }

  deploy-uat:
    name: Deploy (UAT)
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @salesforce/cli
      - run: sf org login jwt --client-id ${{ secrets.SF_CLIENT_ID }} --jwt-key-file server.key --username ${{ secrets.SF_UAT_USERNAME }}
      - run: bash scripts/deploy.sh
        env: { TARGET_ORG: ${{ secrets.SF_UAT_USERNAME }} }

  deploy-prod:
    name: Deploy (Production)
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @salesforce/cli
      - run: sf org login jwt --client-id ${{ secrets.SF_CLIENT_ID }} --jwt-key-file server.key --username ${{ secrets.SF_PROD_USERNAME }}
      - run: bash scripts/deploy.sh
        env: { TARGET_ORG: ${{ secrets.SF_PROD_USERNAME }} }
